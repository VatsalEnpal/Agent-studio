<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0b0e"/>
  <rect x="96" y="96" width="320" height="320" rx="32" fill="#111218" stroke="#1e2028" stroke-width="4"/>
  <!-- Terminal prompt -->
  <text x="140" y="280" font-family="monospace" font-size="180" font-weight="bold" fill="#f59e0b">&#x27E9;</text>
  <!-- Cursor -->
  <rect x="290" y="196" width="16" height="100" rx="4" fill="#4ade80" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </rect>
</svg>
